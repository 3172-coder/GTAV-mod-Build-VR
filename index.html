<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>mods GTAV Zombieland VR</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      overflow: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('background1.jpg') center/cover no-repeat;
      z-index: -2;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('background2.jpg') center/cover no-repeat;
      z-index: -1;
      opacity: 0;
      animation: fadeBg 20s infinite;
    }

    @keyframes fadeBg {
      0% { opacity: 0; }
      40% { opacity: 0; }
      60% { opacity: 1; }
      90% { opacity: 1; }
      100% { opacity: 0; }
    }

    .card {
      background: rgba(30, 41, 59, 0.9);
      padding: 30px;
      border-radius: 12px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
      backdrop-filter: blur(6px);
      z-index: 1;
    }

    h1 { margin-bottom: 20px; }

    .btn {
      display: inline-block;
      margin: 5px;
      padding: 12px 20px;
      background: #3b82f6;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      transition: 0.3s;
      cursor: pointer;
      border: none;
    }

    .btn:hover { background: #2563eb; }

    .links { margin-top: 15px; }

    .links a {
      display: inline-block;
      margin: 5px;
      padding: 10px 18px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      transition: 0.3s;
      color: white !important;
    }

    .links a[href*="boosty"] {
      background: #f97316;
    }

    .links a[href*="boosty"]:hover {
      background: #ea580c;
    }

    .links a[href*="t.me"] {
      background: #4285B4;
    }

    .links a[href*="t.me"]:hover {
      background: #0ea5e9;
    }

    .links a[href*="boosty"] {
      background: #f97316;
      color: white;
    }

    .links a[href*="boosty"]:hover {
      background: #ea580c;
    }

    .links a[href*="t.me"] {
      background: #38bdf8;
      color: white;
    }

    .links a[href*="t.me"]:hover {
      background: #0ea5e9;
    }

    .links a[href*="boosty"] { color: #f97316; } /* оранжевый Boosty */
    .links a[href*="t.me"] { color: #38bdf8; } /* голубой Telegram */

    .links a:hover { opacity: 0.8; }

    .links a:hover { color: white; }

    .note {
      margin-top: 15px;
      font-size: 12px;
      color: #94a3b8;
    }

    /* Модальное окно */
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 10;
    }

    .modal.active { display: flex; }

    .modal-content {
      position: relative;
      width: 1280px;
      height: 720px;
      max-width: 95%;
      max-height: 80%;
    }

    .modal iframe {
      width: 100%;
      height: 100%;
      border: none;
      border-radius: 10px;
    }

    .close {
      position: absolute;
      top: -40px;
      right: 0;
      font-size: 15px;
      cursor: pointer;
      color: white;
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>«All mods for GTAV in one + VR»</h1>

    <a class="btn" href="https://youtu.be/VIDEO_ID_1" target="_blank">Трейлер</a>
    <a class="btn" href="https://youtu.be/VIDEO_ID_2" target="_blank">Установка</a>

    <div class="links">
      <div style="margin-bottom:8px; color:#cbd5f5;">Скачать через</div>
      <a href="https://boosty.to/remaster_101" target="_blank">Boosty</a>
      <a href="https://t.me/remaster_101" target="_blank">Telegram</a>
    </div>

    <div class="note">Сборка модов для GTAV всё в одном by max_remaster</div>
  </div>

  

</body>
</html>
