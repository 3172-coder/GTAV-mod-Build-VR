<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>mods GTAV Zombieland VR</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      overflow: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('background1.jpg') center/cover no-repeat;
      z-index: -2;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('background2.jpg') center/cover no-repeat;
      z-index: -1;
      opacity: 0;
      animation: fadeBg 10s infinite;
    }

    @keyframes fadeBg {
      0% { opacity: 0; }
      40% { opacity: 0; }
      60% { opacity: 1; }
      90% { opacity: 1; }
      100% { opacity: 0; }
    }

    .card {
      background: rgba(30, 41, 59, 0.9);
      padding: 30px;
      border-radius: 12px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
      backdrop-filter: blur(6px);
      z-index: 1;
    }

    h1 { margin-bottom: 20px; }

    .btn {
      display: inline-block;
      margin: 5px;
      padding: 12px 20px;
      background: #3b82f6;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      transition: 0.3s;
      cursor: pointer;
      border: none;
    }

    .btn:hover { background: #2563eb; }

    .links { margin-top: 15px; }

    .links a {
      margin: 0 10px;
      color: #94a3b8;
      text-decoration: none;
    }

    .links a:hover { color: white; }

    .note {
      margin-top: 15px;
      font-size: 12px;
      color: #94a3b8;
    }

    /* Модальное окно */
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 10;
    }

    .modal.active { display: flex; }

    .modal-content {
      position: relative;
      width: 1280px;
      height: 720px;
      max-width: 95%;
      max-height: 80%;
    }

    .modal iframe {
      width: 100%;
      height: 100%;
      border: none;
      border-radius: 10px;
    }

    .close {
      position: absolute;
      top: -40px;
      right: 0;
      font-size: 30px;
      cursor: pointer;
      color: white;
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>"GTAV Zombieland VR"</h1>

    <button class="btn" onclick="openModal('https://www.youtube.com/embed/AWFaj4IQ4ro?si=6cB-S4Y8wCIz9GlF')">Трейлер</button>
    <button class="btn" onclick="openModal('https://www.youtube.com/embed/-MD7BOwNpGw" title="Я буду KILLKA - Мэшап by Remaster')">Установка</button>

    <div class="links">
      <a href="https://boosty.to/YOUR" target="_blank">Boosty</a>
      <a href="https://t.me/YOUR" target="_blank">Telegram</a>
    </div>

    <div class="note">Сборка модов для GTAV "GTAV Zombieland VR" всё в одном by max_remaster</div>
  </div>

  <!-- Модальное окно -->
  <div class="modal" id="modal">
    <div class="modal-content">
      <span class="close" onclick="closeModal()">✖</span>
      <iframe id="videoFrame" src="" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
    </div>
  </div>

  <script>
    function openModal(url) {
      document.getElementById('modal').classList.add('active');
      // добавляем autoplay и нужные параметры как у embed
      const fullUrl = url + '?autoplay=1&rel=0';
      document.getElementById('videoFrame').src = fullUrl;
    }

    function closeModal() {
      document.getElementById('modal').classList.remove('active');
      document.getElementById('videoFrame').src = '';
    }

    // Закрытие по клику вне видео
    document.getElementById('modal').addEventListener('click', function(e) {
      if (e.target === this) closeModal();
    });
  </script>

</body>
</html>
